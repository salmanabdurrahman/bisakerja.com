name: ci-api

on:
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/ci-api.yml"
  push:
    branches: ["main"]
    paths:
      - "apps/api/**"

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod

      - name: Verify formatting
        run: |
          test -z "$(gofmt -l ./cmd ./internal ./pkg ./test)"

      - name: Vet
        run: make vet

      - name: Test
        run: go test ./... -coverprofile=coverage.out

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 1

      - name: Build
        run: make build

      - name: Validate migrations
        run: make check-migrations

      - name: Install gosec
        run: GOBIN="$PWD/bin" go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Static security scan (gosec)
        run: $PWD/bin/gosec ./...

      - name: Install govulncheck
        run: GOBIN="$PWD/bin" go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Dependency vulnerability scan (govulncheck)
        continue-on-error: true
        run: $PWD/bin/govulncheck ./...
