name: ci-web

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/ci-web.yml"
  push:
    branches: ["main"]
    paths:
      - "apps/web/**"

jobs:
  lint-type-test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm test:coverage

      - name: Dependency audit (high)
        run: pnpm audit --audit-level=high --prod

      - name: Build
        run: pnpm build
